<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记忆便签 - 桌面背景</title>
    <style>
      :root {
        --primary-color: #4caf50;
        --bg-blur: rgba(255, 255, 255, 0.2);
        --panel-bg: rgba(255, 255, 255, 0.9);
        --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        overflow: hidden;
        box-sizing: border-box;
        background: linear-gradient(
          135deg,
          #667eea 0%,
          #764ba2 100%
        ); /* 默认渐变背景 */
      }

      body {
        padding: 40px;
      }

      /* 右上角应用Icon */
      #app-icon {
        position: absolute;
        top: 40px;
        right: 20px;
        width: 60px;
        height: 60px;
        background: var(--panel-bg);
        backdrop-filter: blur(4px);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: var(--shadow);
        transition:
          transform 0.2s,
          background 0.2s;
        z-index: 100;
      }

      #app-icon:hover {
        transform: scale(1.05);
        background: #fff;
      }

      #app-icon img {
        width: 30px;
        height: 30px;
        margin-bottom: 4px;
      }

      #app-icon span {
        font-size: 10px;
        color: #333;
        font-weight: bold;
      }

      /* 菜单 */
      #menu {
        position: absolute;
        top: 90px;
        right: 20px;
        background: var(--panel-bg);
        backdrop-filter: blur(8px);
        border-radius: 8px;
        box-shadow: var(--shadow);
        display: none;
        flex-direction: column;
        overflow: hidden;
        z-index: 100;
        min-width: 120px;
      }

      .menu-item {
        padding: 12px 16px;
        font-size: 14px;
        color: #333;
        cursor: pointer;
        transition: background 0.2s;
      }

      .menu-item:hover {
        background: rgba(76, 175, 80, 0.1);
        color: var(--primary-color);
      }

      /* 弹窗面板 */
      .panel {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        max-width: 90%;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        display: none;
        flex-direction: column;
        padding: 24px;
        z-index: 1000;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .panel-header h3 {
        margin: 0;
        font-size: 18px;
        color: #333;
      }

      .close-btn {
        cursor: pointer;
        font-size: 20px;
        color: #999;
      }

      /* 存入新的记忆表单 */
      #save-form textarea {
        width: 100%;
        height: 120px;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        font-size: 14px;
        resize: none;
        margin-bottom: 16px;
        box-sizing: border-box;
        outline: none;
      }

      #save-form textarea:focus {
        border-color: var(--primary-color);
      }

      .primary-btn {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
      }

      /* 查找过往记忆列表 */
      #search-panel {
        max-height: 80vh;
      }

      .search-bar {
        margin-bottom: 16px;
      }

      .search-bar input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
        outline: none;
      }

      #memory-list {
        overflow-y: auto;
        max-height: 300px;
      }

      .loading {
        text-align: center;
        padding: 30px 20px;
        font-style: italic;
        position: relative;
      }

      .loading-text {
        color: #00f0ff;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        position: relative;
        display: inline-block;
        text-shadow: 0 0 10px rgba(0, 240, 255, 0.8);
        animation: pulse 1.5s ease-in-out infinite;
      }

      .loading::before,
      .loading::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 2px solid transparent;
      }

      .loading::before {
        border-top-color: #00f0ff;
        border-right-color: #00f0ff;
        animation: spin 1s linear infinite;
      }

      .loading::after {
        width: 40px;
        height: 40px;
        border-bottom-color: #7b2ff7;
        border-left-color: #7b2ff7;
        animation: spin 0.8s linear infinite reverse;
        top: calc(50% - 20px);
        left: calc(50% - 20px);
      }

      .scan-line {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #00f0ff, transparent);
        animation: scan 2s linear infinite;
        opacity: 0.6;
      }

      .searching .scan-line {
        top: -20px;
      }

      @keyframes spin {
        0% {
          transform: translateX(-50%) rotate(0deg);
        }
        100% {
          transform: translateX(-50%) rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes scan {
        0% {
          top: 0;
        }
        100% {
          top: 100%;
        }
      }

      .tech-dots {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 50px;
      }

      .tech-dots span {
        width: 6px;
        height: 6px;
        background: #00f0ff;
        border-radius: 50%;
        animation: dotPulse 1.4s ease-in-out infinite;
        box-shadow: 0 0 8px rgba(0, 240, 255, 0.8);
      }

      .tech-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .tech-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes dotPulse {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.5;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.3s ease-out;
      }

      .searching {
        min-height: 120px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .search-result {
        padding: 12px;
        border-bottom: 1px solid #eee;
        position: relative;
      }

      .search-result:last-child {
        border-bottom: none;
      }

      .search-content {
        font-size: 14px;
        color: #444;
        line-height: 1.6;
        word-break: break-all;
      }

      .memory-item {
        padding: 12px;
        border-bottom: 1px solid #eee;
        position: relative;
      }

      .memory-item:last-child {
        border-bottom: none;
      }

      .memory-content {
        font-size: 14px;
        color: #444;
        line-height: 1.6;
        word-break: break-all;
      }

      .memory-time {
        font-size: 11px;
        color: #999;
        margin-top: 4px;
      }

      .delete-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        color: #ff4d4f;
        cursor: pointer;
        font-size: 12px;
        display: none;
      }

      .memory-item:hover .delete-btn {
        display: block;
      }

      /* 背景点击关闭菜单 */
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        display: none;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        z-index: 900;
        display: none;
      }

      /* iframe播放器 */
      #player-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 800px;
        height: 70vh;
        max-height: 600px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(255, 255, 255, 0.3) inset;
        display: none;
        flex-direction: column;
        overflow: hidden;
        z-index: 950;
        animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translate(-50%, -45%);
        }
        to {
          opacity: 1;
          transform: translate(-50%, -50%);
        }
      }

      .player-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;
        background: linear-gradient(
          135deg,
          rgba(102, 126, 234, 0.1),
          rgba(118, 75, 162, 0.1)
        );
        border-bottom: 1px solid rgba(102, 126, 234, 0.2);
      }

      .player-title {
        font-size: 16px;
        font-weight: 600;
        color: #333;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .player-title::before {
        content: "";
        width: 8px;
        height: 8px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      .player-close {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: rgba(0, 0, 0, 0.05);
        color: #666;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .player-close:hover {
        background: rgba(255, 77, 79, 0.1);
        color: #ff4d4f;
        transform: rotate(90deg);
      }

      .player-minimize {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: rgba(0, 0, 0, 0.05);
        color: #666;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        margin-right: 8px;
      }

      .player-minimize:hover {
        background: rgba(102, 126, 234, 0.1);
        color: #667eea;
      }

      #mini-player {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 50%;
        box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        transition: transform 0.2s;
        animation: pulse 2s ease-in-out infinite;
      }

      #mini-player:hover {
        transform: scale(1.1);
      }

      #mini-player::after {
        content: "";
        width: 0;
        height: 0;
        border-left: 16px solid #fff;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        margin-left: 2px;
      }

      #player-frame {
        flex: 1;
        width: 100%;
        border: none;
        background: #fff;
      }

      /* 播放按钮 */
      #play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 50%;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 10px 30px rgba(102, 126, 234, 0.4),
          0 0 0 0 rgba(102, 126, 234, 0.5);
        animation: breathe 2s ease-in-out infinite;
        z-index: 10;
        transition: transform 0.2s;
      }

      #play-btn:hover {
        transform: translate(-50%, -50%) scale(1.1);
      }

      @keyframes breathe {
        0%,
        100% {
          box-shadow:
            0 10px 30px rgba(102, 126, 234, 0.4),
            0 0 0 0 rgba(102, 126, 234, 0.5);
        }
        50% {
          box-shadow:
            0 10px 30px rgba(102, 126, 234, 0.4),
            0 0 0 15px rgba(102, 126, 234, 0);
        }
      }

      #play-btn::after {
        content: "";
        width: 0;
        height: 0;
        border-left: 20px solid #fff;
        border-top: 12px solid transparent;
        border-bottom: 12px solid transparent;
        margin-left: 4px;
      }
    </style>
  </head>

  <!-- 内置的用于通信的sdk不要移除 -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const pendingCallbacks = new Map();

    const generateId = () =>
      "msg_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);

    window.addEventListener("message", async (event) => {
      const data = event.data;

      if (data && data.id) {
        const callback = pendingCallbacks.get(data.id);
        if (callback) {
          // 有回调，说明是响应消息
          if (data.code === 200) {
            callback.resolve(data);
          } else {
            callback.reject(new Error(data.msg));
          }
          pendingCallbacks.delete(data.id);
        } else {
          // 没有回调，说明是请求消息，需要处理
          console.log("收到消息----", data.method);

          // action from shell
          switch (data.method) {
            case "screenshot":
              const canvas = await html2canvas(document.body, {
                backgroundColor: "#1a1a2e",
                scale: 0.5,
              });
              window.parent.postMessage(
                {
                  id: data.id,
                  method: data.method,
                  code: 200,
                  data: canvas.toDataURL("image/png"),
                },
                "*",
              );
              break;

            default:
              window.parent.postMessage(
                {
                  id: data.id,
                  method: data.method,
                  code: 404,
                  data: null,
                  msg: "unknown method",
                },
                "*",
              );
              break;
          }
        }
        return;
      }
    });

    async function invoke(data_type, payload) {
      return new Promise((resolve, reject) => {
        const id = generateId();
        pendingCallbacks.set(id, { resolve, reject });
        parent.postMessage({ id, method: data_type, payload }, "*");
        setTimeout(() => {
          if (pendingCallbacks.has(id)) {
            pendingCallbacks.delete(id);
            reject(new Error("Request timeout"));
          }
        }, 30000);
      });
    }
  </script>
  <!-- Endregion -->

  <script>
    const sleep = async (t) => {
      return new Promise((resolve) => {
        setTimeout(resolve, t);
      });
    };

    let sessionId = "";
    const createSession = async () => {
      try {
        const response = await invoke("postBody", {
          url: "http://127.0.0.1:4096/session",
        });

        console.log("createSession", response);
        sessionId = response.data.id;
        return sessionId;
      } catch (error) {
        console.error("Failed to create session:", error);
        throw error;
      }
    };

    const sessionMessage = async (message) => {
      try {
        const response = await invoke("postBody", {
          url: `http://127.0.0.1:4096/session/${sessionId}/message`,
          data: {
            agent: "build",
            model: {
              modelID: "big-pickle",
              providerID: "opencode",
            },
            parts: [
              {
                type: "text",
                text: message,
              },
            ],
          },
        });
        console.log("sessionMessage answer", response);

        return (
          response?.data?.parts?.find((part) => part.type == "text")?.text || ""
        );
      } catch (error) {
        console.error("Failed to send session message:", error);
        throw error;
      }
    };

    window.onload = async () => {
      await sleep(3000);
      const res = await invoke("opencode");
      await sleep(3000);
      const session = await createSession();
      const files = await invoke("scan_worksapce_file", {
        path: "",
        postfix: "mp3",
      });

      await invoke("open_workspace");

      console.log("files", files);
    };
  </script>
