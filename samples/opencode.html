<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记忆便签 - 桌面背景</title>
    <style>
      :root {
        --primary-color: #4caf50;
        --bg-blur: rgba(255, 255, 255, 0.2);
        --panel-bg: rgba(255, 255, 255, 0.9);
        --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      }

      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        overflow: hidden;
        background: linear-gradient(
          135deg,
          #667eea 0%,
          #764ba2 100%
        ); /* 默认渐变背景 */
      }

      /* 右上角应用Icon */
      #app-icon {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        background: var(--panel-bg);
        backdrop-filter: blur(4px);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: var(--shadow);
        transition:
          transform 0.2s,
          background 0.2s;
        z-index: 100;
      }

      #app-icon:hover {
        transform: scale(1.05);
        background: #fff;
      }

      #app-icon img {
        width: 30px;
        height: 30px;
        margin-bottom: 4px;
      }

      #app-icon span {
        font-size: 10px;
        color: #333;
        font-weight: bold;
      }

      /* 菜单 */
      #menu {
        position: absolute;
        top: 90px;
        right: 20px;
        background: var(--panel-bg);
        backdrop-filter: blur(8px);
        border-radius: 8px;
        box-shadow: var(--shadow);
        display: none;
        flex-direction: column;
        overflow: hidden;
        z-index: 100;
        min-width: 120px;
      }

      .menu-item {
        padding: 12px 16px;
        font-size: 14px;
        color: #333;
        cursor: pointer;
        transition: background 0.2s;
      }

      .menu-item:hover {
        background: rgba(76, 175, 80, 0.1);
        color: var(--primary-color);
      }

      /* 弹窗面板 */
      .panel {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        max-width: 90%;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        display: none;
        flex-direction: column;
        padding: 24px;
        z-index: 1000;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .panel-header h3 {
        margin: 0;
        font-size: 18px;
        color: #333;
      }

      .close-btn {
        cursor: pointer;
        font-size: 20px;
        color: #999;
      }

      /* 存入新的记忆表单 */
      #save-form textarea {
        width: 100%;
        height: 120px;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        font-size: 14px;
        resize: none;
        margin-bottom: 16px;
        box-sizing: border-box;
        outline: none;
      }

      #save-form textarea:focus {
        border-color: var(--primary-color);
      }

      .primary-btn {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
      }

      /* 查找过往记忆列表 */
      #search-panel {
        max-height: 80vh;
      }

      .search-bar {
        margin-bottom: 16px;
      }

      .search-bar input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
        outline: none;
      }

      #memory-list {
        overflow-y: auto;
        max-height: 300px;
      }

      .memory-item {
        padding: 12px;
        border-bottom: 1px solid #eee;
        position: relative;
      }

      .memory-item:last-child {
        border-bottom: none;
      }

      .memory-content {
        font-size: 14px;
        color: #444;
        line-height: 1.6;
        word-break: break-all;
      }

      .memory-time {
        font-size: 11px;
        color: #999;
        margin-top: 4px;
      }

      .delete-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        color: #ff4d4f;
        cursor: pointer;
        font-size: 12px;
        display: none;
      }

      .memory-item:hover .delete-btn {
        display: block;
      }

      /* 背景点击关闭菜单 */
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        display: none;
      }

      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        z-index: 900;
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- 桌面背景点击层 -->
    <div id="overlay"></div>
    <div id="modal-overlay" class="modal-overlay"></div>

    <!-- 右上角Icon -->
    <div id="app-icon" title="记忆便签">
      <svg
        viewBox="0 0 24 24"
        width="30"
        height="30"
        fill="currentColor"
        style="color: #4caf50"
      >
        <path
          d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"
        />
      </svg>
      <span>记忆便签</span>
    </div>

    <!-- 下拉菜单 -->
    <div id="menu">
      <div class="menu-item" onclick="showSavePanel()">存入新的记忆</div>
      <div class="menu-item" onclick="showSearchPanel()">查找过往记忆</div>
    </div>

    <!-- 存入面板 -->
    <div id="save-panel" class="panel">
      <div class="panel-header">
        <h3>存入新的记忆</h3>
        <span class="close-btn" onclick="hidePanels()">&times;</span>
      </div>
      <div id="save-form">
        <textarea
          id="note-input"
          placeholder="在这儿写下你想记住的事情..."
        ></textarea>
        <button class="primary-btn" onclick="saveMemory()" style="width: 100%">
          存入脑海
        </button>
      </div>
    </div>

    <!-- 查找面板 -->
    <div id="search-panel" class="panel">
      <div class="panel-header">
        <h3>过往记忆</h3>
        <span class="close-btn" onclick="hidePanels()">&times;</span>
      </div>
      <div class="search-bar">
        <input
          type="text"
          id="search-input"
          placeholder="搜索记忆..."
          oninput="renderMemories()"
        />
      </div>
      <div id="memory-list">
        <!-- 记忆条目动态渲染 -->
      </div>
    </div>

    <!-- 内置的用于通信的sdk不要移除 -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@opencode-ai/sdk@1.2.15/dist/index.min.js"></script>
    <script>
      const pendingCallbacks = new Map();

      const generateId = () =>
        "msg_" + Date.now() + "_" + +Math.random().toString(36).substr(2, 9);

      window.addEventListener("message", async (event) => {
        const data = event.data;

        if (data && data.id) {
          const callback = pendingCallbacks.get(data.id);
          if (callback) {
            // 有回调，说明是响应消息
            if (data.code === 200) {
              callback.resolve(data);
            } else {
              callback.reject(new Error(data.msg));
            }
            pendingCallbacks.delete(data.id);
          } else {
            // 没有回调，说明是请求消息，需要处理
            console.log("收到消息----", data.method);

            // action from shell
            switch (data.method) {
              case "screenshot":
                const canvas = await html2canvas(document.body, {
                  backgroundColor: "#1a1a2e",
                  scale: 0.5,
                });
                window.parent.postMessage(
                  {
                    id: data.id,
                    method: data.method,
                    code: 200,
                    data: canvas.toDataURL("image/png"),
                  },
                  "*",
                );
                break;

              default:
                window.parent.postMessage(
                  {
                    id: data.id,
                    method: data.method,
                    code: 404,
                    data: null,
                    msg: "unknown method",
                  },
                  "*",
                );
                break;
            }
          }
          return;
        }
      });

      async function invoke(data_type, payload) {
        return new Promise((resolve, reject) => {
          const id = generateId();
          pendingCallbacks.set(id, { resolve, reject });
          parent.postMessage({ id, method: data_type, payload }, "*");
          setTimeout(() => {
            if (pendingCallbacks.has(id)) {
              pendingCallbacks.delete(id);
              reject(new Error("Request timeout"));
            }
          }, 10000);
        });
      }
    </script>
    <!-- Endregion -->

    <script>
      const appIcon = document.getElementById("app-icon");
      const menu = document.getElementById("menu");
      const overlay = document.getElementById("overlay");
      const modalOverlay = document.getElementById("modal-overlay");
      const savePanel = document.getElementById("save-panel");
      const searchPanel = document.getElementById("search-panel");
      const noteInput = document.getElementById("note-input");
      const searchInput = document.getElementById("search-input");
      const memoryList = document.getElementById("memory-list");

      // 切换菜单显示
      appIcon.onclick = (e) => {
        e.stopPropagation();
        const isVisible = menu.style.display === "flex";
        menu.style.display = isVisible ? "none" : "flex";
        overlay.style.display = isVisible ? "none" : "block";
      };

      // 点击背景关闭菜单
      overlay.onclick = () => {
        menu.style.display = "none";
        overlay.style.display = "none";
      };

      modalOverlay.onclick = hidePanels;

      function showSavePanel() {
        hidePanels();
        savePanel.style.display = "flex";
        modalOverlay.style.display = "block";
        noteInput.focus();
      }

      function showSearchPanel() {
        hidePanels();
        searchPanel.style.display = "flex";
        modalOverlay.style.display = "block";
        renderMemories();
      }

      function hidePanels() {
        savePanel.style.display = "none";
        searchPanel.style.display = "none";
        modalOverlay.style.display = "none";
        menu.style.display = "none";
        overlay.style.display = "none";
      }

      // 数据管理
      function getMemories() {
        const data = localStorage.getItem("desktop_memories");
        return data ? JSON.parse(data) : [];
      }

      function saveMemory() {
        const content = noteInput.value.trim();
        if (!content) return;

        const memories = getMemories();
        memories.unshift({
          id: Date.now(),
          content: content,
          time: new Date().toLocaleString(),
        });

        localStorage.setItem("desktop_memories", JSON.stringify(memories));
        noteInput.value = "";
        hidePanels();
        alert("记忆已存入！");
      }

      function deleteMemory(id) {
        if (confirm("确定要抹除这段记忆吗？")) {
          const memories = getMemories().filter((m) => m.id !== id);
          localStorage.setItem("desktop_memories", JSON.stringify(memories));
          renderMemories();
        }
      }

      function renderMemories() {
        const keyword = searchInput.value.toLowerCase();
        const memories = getMemories().filter((m) =>
          m.content.toLowerCase().includes(keyword),
        );

        memoryList.innerHTML = memories.length
          ? ""
          : '<div style="text-align:center;color:#999;padding:20px;">空空如也</div>';

        memories.forEach((m) => {
          const item = document.createElement("div");
          item.className = "memory-item";
          item.innerHTML = `
                    <div class="memory-content">${escapeHtml(m.content)}</div>
                    <div class="memory-time">${m.time}</div>
                    <div class="delete-btn" onclick="deleteMemory(${m.id})">删除</div>
                `;
          memoryList.appendChild(item);
        });
      }

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      window.onload = async () => {
        await invoke("opencode");
        const client = new Opencode();
        console.log(client);
      };
    </script>
  </body>
</html>
